# Local no-docker profile for UX/E2E smoke runs.
# Uses in-memory H2 and deterministic dev secrets so the app can boot without external services.

server.port=8080
app.domain=http://localhost:8080
app.url.front-end=http://localhost:8081

spring.datasource.url=jdbc:h2:mem:alovoa_local;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.defer-datasource-initialization=true

spring.mail.test-connection=false
bucket4j.enabled=false

# Required secrets for SecurityConfig/TextEncryptorConverter in local boot.
app.text.key=bqupWgmhCj3fedLxYdNAy2QFA2bS9XJX
app.text.salt=sFRKQAhwdrZq44FQ
app.admin.email=admin@alovoa.com
app.admin.key=password

# OAuth placeholders required by spring-security oauth2 auto-config.
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.facebook.client-id=test
spring.security.oauth2.client.registration.facebook.client-secret=test

# Keep runtime local-first and dependency-light.
app.storage.s3.enabled=false
app.social-import.require-linked-ownership=true
app.moderation.image.enabled=false
app.moderation.text-service.enabled=false
app.aura.backend.java-media.enabled=true
app.aura.backend.java-ai.enabled=true
