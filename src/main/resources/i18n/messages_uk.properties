faq.encryption.answer=Використовуючи алгоритм шифрування AES.
faq.open-source.question=Що значить відкритість коду? Чому цей проект опенсорс?
faq.open-source.answer=Опенсорс буквально означає, що будь-хто може бачити вихідний код, що був створений, буль-хто може його міняти та допомагати виправити недоілки. Ми віримо, що опенсорс - це майбутнє усіх технологій.
faq.safari.question=Я використовую браузер Сафарі і щось не працює!
faq.safari.answer=Оскільки Сафарі має обмеження розробників, він офіційно не підтримується. Якщо Ви на МакОСб рекомендуємо Фаєрфокс. Сафарі не підтримує пуш нотифікації для жодної платформи, будь-ласка почитайте про це <a href="https://developer.apple.com/bug-reporting/">тут</a>.
