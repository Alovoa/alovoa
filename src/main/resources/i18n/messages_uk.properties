backend.privacy=<h3>Політика Конфіденційності</h3><p>This privacy policy will explain how our organization uses the personal data we collect from you when you use our website.</p><h3>What data do we collect?</h3><p>COMPANY_NAME collects the following data:</p><ul><li>Personal identification information (Name, email address, birth date, etc.).</li><li>Your location and preferences.</li><li>Any interaction you have with another user.</li></ul><h3>How do we collect your data?</h3><p>You directly provide COMPANY_NAME with most of the data we collect. We collect data and process data when you:</p><ul><li>Register online.</li><li>Provide information in your profile area.</li><li>Search for other users.</li><li>Visit any page on the website.</li><li>Interact with users on the platform.</li><li>Voluntarily complete a customer survey or provide feedback.</li></ul><h3>How will we use your data?</h3><p>COMPANY_NAME collects your data so that we can:</p><ul><li>Manage your account.</li><li>Email you with important changes and news.</li><li>Allow other users to find you.</li></ul><h3>Third-party APIs</h3><p>COMPANY_NAME uses third-party APIs of these sites</p><ul><li>openstreetmap.org. Your general location is used to render map data when searching for users.</li><li>meet.jit.si. No personal data is shared, but their service is used to enable video and audio communication between users.</li><li>google.com and facebook.com. Your personal data stays safe in our local database, but these OAuth providers are able to indentify you each time you use their services.</li></ul><h3>How do we store your data?</h3><p>COMPANY_NAME stores your data in a secure database.</p><p>COMPANY_NAME will keep your personal data for unlimited time. You can request to delete your data at all times.</p><p>COMPANY_NAME would like to make sure you are fully aware of all of your data protection rights. Every user is entitled to the following:</p><p><strong>The right to access</strong>– You have the right to request COMPANY_NAME for copies of your personal data. We may charge you a small fee for this service.</p><p><strong>The right to rectification</strong>– You have the right to request that COMPANY_NAME correct any information you believe is inaccurate. You also have the right to request COMPANY_NAME to complete the information you believe is incomplete.</p><p><strong>The right to erasure</strong>– You have the right to request that COMPANY_NAME erase your personal data, under certain conditions.</p><p><strong>The right to restrict processing</strong>- You have the right to request that COMPANY_NAME restrict the processing of your personal data, under certain conditions.</p><p><strong>The right to object to processing</strong>– You have the right to object to COMPANY_NAME – processing of your personal data, under certain conditions.</p><p><strong>The right to data portability</strong>– You have the right to request that COMPANY_NAME transfer the data that we have collected to another organization, or directly to you, under certain conditions.</p><p>If you make a request, we have one month to respond to you. If you would like to exercise any of these rights, please follow the instruction on how to contact us at the bottom of this page.</p><h3>Cookies</h3><p>Cookies are text files placed on your computer to collect standard Internet log information and visitor behavior information. When you visit our websites, we may collect information from you automatically through cookies or similar technology</p><p>For further information, visit allaboutcookies.org.</p><h3>How do we use cookies?</h3><p>COMPANY_NAME uses cookies in a range of ways to improve your experience on our website, including:</p><ul><li>Keeping you signed in.</li><li>Storing non-personal data.</li></ul><h3>What types of cookies do we use?</h3><p>There are a number of different types of cookies, however, our website uses:</p><ul><li>Functionality – COMPANY_NAME uses these cookies so that we recognize you on our website and remember your previously selected preferences. These could include what language you prefer and location you are in.</li><li>That's it. Unlike our competitors, we don't have any cookies that can track you.</li></ul><h3>How to manage cookies</h3><p>You can set your browser not to accept cookies, and the above website tells you how to remove cookies from your browser. However, in a few cases, some of our website features may not function as a result.</p><h3>Privacy policies of other websites</h3><p>The COMPANY_NAME website contains links to other websites. Our privacy policy applies only to our website, so if you click on a link to another website, you should read their privacy policy.</p><h3>Changes to our privacy policy</h3><p>COMPANY_NAME keeps its privacy policy under regular review and places any updates on this web page. This privacy policy was last updated on PRIVACY_UPDATE_DATE.</p><h3>How to contact us</h3><p>If you have any questions about COMPANY_NAME's privacy policy, the data we hold on you, or you would like to exercise one of your data protection rights, please do not hesitate to contact us <a href="/imprint">here</a>. Your contact data will be saved up to 90 days.</p><h3>How delete your data</h3><p>Please follow the <a href="/faq#delete-data">instructions on our FAQ page</a></p>#do not translate
backend.tos=<h3>Мови користування Сервісом</h3><p>Updated on TOS_UPDATE_DATE</p><h3>1. Introduction</h3><p>By using our Services, you accept the Terms of Service, which may be updated from time to time and our Privacy Policy. If you do not accept and agree to be bound by all of the terms, please do not use our services.</p><p>The platform is available in multiple languages, but only the languages English and German are officially supported. We cannot guarantee the correctness of any content from another language.</p><h3>2. Eligibility</h3><p>By creating an account and using the service, you represent and warrant that:</p><ul><li>you can form a binding contract with COMPANY_NAME.</li><li>you are at least MIN_AGE years old.</li><li>you do not have more than one account on our services.</li><li>you will comply with this agreement and all national and international laws.</li><li>you have never been found guilty for a sex crime or violence related crime.</li><li>you treat others with a respectful manner.</li><li>you only upload data that belongs to you.</li><li>you do not impersonate another person.</li><li>you do not share illegal content.</li><li>you do not share links in your public profile.</li><li>you do not harass, bully, stalk, intimidate, assault, defame, harm or otherwise mistreat any person.</li><li>you do not upload sexual implicit or explicit content.</li><li>you have not previously been banned from our services.</li></ul><h3>4. Your content</h3><p>You are solely responsible and liable for any content that you upload. By uploading your content you acknowledge that you own all the rights to do so.</p><h3>5. Privacy</h3><p>For all information regarding privacy, please read our Privacy Policy.</p><h3>6. Donations & Refunds</h3><p>COMPANY_NAME only receives donations and does not sell any virtual good or subscriptions. Donations are not refundable, except when it’s required by the country you reside in.</p><h3>7. Our rights</h3><p>We reserve the right to terminate your account at all times without prior notification.</p><h3>8. Disclaimer</h3><p>COMPANY_NAME PROVIDES THE SERVICE ON AN “AS IS” AND “AS AVAILABLE” BASIS AND TO THE EXTENT PERMITTED BY APPLICABLE LAW, GRANTS NO WARRANTIES OF ANY KIND. </p><p>COMPANY_NAME DOES NOT REPRESENT OR WARRANT THAT THE SERVICE WILL BE UNINTERRUPTED OR ERROR FREE, OR THAT ANY CONTENT OR INFORMATION YOU OBTAIN ON OR THROUGH THE SERVICE WILL BE ACCURATE. </p><p>COMPANY_NAME TAKES NO RESPONSIBILITY FOR ANY CONTENT THAT YOU OR ANOTHER USER POSTS OR SENDS. </p><p>COMPANY_NAME IS NOT RESPONSIBLE FOR ANY DAMAGE TO YOUR COMPUTER HARDWARE OR SOFTWARE. </p>
faq.match.question=У мене нема жодних збігів, повідомлень?
faq.match.answer=Додай нові, не кориговані зображення у свій профіль. Скажи про себе щось: що любиш, кого шукаєш у описі.
faq.no-users.question=НЕма людей у мойому регіоні!
faq.no-users.answer=Спробуй через кілька днів, нових користувачів може побільшати згодом. Додатково, донать та скажи про сервіс друзям щоб зробити платформу більш популярною!
faq.delete-data.question=Я хочу видалити мої дані, як це зробити?
faq.delete-data.answer=Нам жаль, що ти йдеш, але Ти, звичайно можеш. Клікни посилання "Видалити" знизу профіля. Після цього слідуй інструкціям у листі, що буде надіслано.
