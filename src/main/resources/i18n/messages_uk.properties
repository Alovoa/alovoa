index.cookie.notice=Цей сайт містить кукі сесії та налаштування користувача щоб коректно працювати. Ваші дані у безпеці з нами, ми не збираємо жодних персональних даних в кукі та не відправляємо їх жодним третім сторонам. Продовжуючи далі, Ви погоджуєтесь використовувати кукі.
index.cookie.more=Клікніть тут щоб дізнатись більше
index.subtitle=Зустрічайтесь з новими, прекрасними людьми!
index.subtitle-2=100% безкоштовно, без реклами
index.notice=Усі фото моделей використані виключно з ілюстративною метою
index.key-features=Основні можливості
index.free.title=Назавжди безкоштовно
index.free.description=Ця плафторма не потребує жодних виплат, Ви вільні використовувати усі її можливості без обмежень. Ми повністю сподіваємось на Ваш донат щоб платформа продовжила розвиватись.
index.open-source.title=Відкритий код
index.open-source.description=Сподіваємось на прозорість та не обтяження. Кожен рядок коду та використані бібліотеки відкриті, даючи можливість передивитись та покращити платформу за Вашим бажанням.
index.private.title=Безпечно та конфіденційно
index.private.description=Ми не продаємо жодної інформації будь-кому, це обіцянка якої ми дотримуватимемось завжди. Додатково, Ваші чутливі дані надійно зашифровані та у безпеці від не санкціонованого втручання.
index.ad-free.title=Безкоштовна реклама
index.ad-free.description=РЕклама уповільнює браузер, втручається, набридає та може потенційно занести шкідливе програмне забезпечення на Ваш пристрій. Ось чому Ви не побачите її на цій платформі, що набагато важливіше для нас ніж прибутки від реклами.
index.technology.title=Останні технології
index.technology.description=Ми використовуємо останні технології, тому Ви зможете отримати переваги через браузер. Наприклад, можете інсталювати цю платформу як <a href="https://wikipedia.org/wiki/Progressive_web_application"> прогресивний веб додаток</a> безпосередньо з Вашого браузера!
index.for-you.title=Створено для Вас
index.for-you.description=З додатковими фільтрами Ви побачите людей, що відповідають Вашим критеріям. Так, Ви витрачатимете менше часу на пошук та зустрічі з новими людьми.
index.sign-up-now=Підпишись зараз!
index.js.confirm-registration=Запит на Підтвердження пошти відправлено на Вашу пошту.
index.js.registration-confirm-success=Підтвердження успішне. Можете авторизуватись та готуватись зустрічатись з людьми!
index.js.registration-confirm-failed=Підтвердження не успішне. Будь ласка спробуйте ще!
index.js.password-reset-requested=Пошта для скидання Вашого пароля - надіслане. Будь ласка, перевірте Вашу пошту та слідуйте інструкціям.
