donate.largest-donations=התרומות הגדולות ביותר
donate.donate-now=לתרום כעת
donate-list.store.warning=הקישורים לתרומות אינם זמינים בגלל חוקי החנות. נא לבקר אתר זה בדפדפן כדי לתרום.
index.cookie.notice=אתר זה משתמש בקוקיות לשמירת הביקור והעדפות המשתמש כדי לתפקד כראוי. המידע שלך בטוח אצלנו כי אנחנו לא מאחסנים אף מידע אישי בקוקיות ואנחנו לא שולחים שום מידע לצד שלישי. המשך השימוש באתר מסמן הסכמה לשימוש בקוקיות.
index.cookie.more=יש ללחוץ כאן למידע נוסף
index.subtitle=פגשו אנשים חדשים ומלהיבים!
index.subtitle-2=100% חינם, ללא פרסומות
index.notice=כל התמונות הן של דוגמנים ושל דוגמניות והן נועדו להמחשה בלבד
index.key-features=תכונות עיקריות
index.free.title=חינם לתמיד
index.free.description=אין צורך לשלם שום עמלה על פלטפורמה זו, ניתן להשתמש בכל התכונות ללא הגבלה. אנחנו נשענים לחלוטין על התרומות הנדיבות שלכם שעוזרות לפלטפורמה להתקדם.
index.open-source.title=קוד פתוח
index.open-source.description=אנחנו מאמינים בשקיפות, לא באטימות. כל שורה של קוד וכל ספרייה שהשתמשנו בה – הכול חופשי ובקוד פתוח. כך כל אחד יכול לצפות במקור ולשפר את הפלטפורמה, אם הוא ירצה.
index.private.title=פרטיות ואבטחה
index.private.description=אנחנו לא מוכרים את המידע שלכם לאף אחד וזו הטבחה שלעולם נשמור. בנוסף, המידע הרגיש ביותר שלכם מוצפן מאוד ויהיה בטוח גם אם יפרצו אלינו.
index.ad-free.title=ללא פרסומות
index.ad-free.description=פרסומות מאיטות את הדפדפן, פולשניות, מציקות ויכולות „להזריק” נוזקות למכשיר שלך. לכן לא יהיו שום פרסומות בפלטפורמה זו כי אנחנו מאמינים שהחוויה שלך חשובה יותר מהרווח שלנו.
index.technology.title=טכנולוגיה חדשנית
index.technology.description=אנחנו משתמשים בטכנולוגיה העדכנית ביותר כדי שתוכלו ליהנות מהתכונות החדשות ביותר שיש לרשת להציע. למשל, ניתן להתקין את הפלטפורמה <a href="https://he.wikipedia.org/wiki/%D7%99%D7%99%D7%A9%D7%95%D7%9D_%D7%90%D7%99%D7%A0%D7%98%D7%A8%D7%A0%D7%98_%D7%9E%D7%AA%D7%A7%D7%93%D7%9D">כיישום אינטרנט מתקדם</a> ישירות מהדפדפן!
index.for-you.title=נבנה עבורך
index.for-you.description=בעזרת סננים מתקדמים אנחנו מראים לך רק אנשים המתאימים לקריטריונים שלך. כך מתבזבז פחות זמן על חיפוש ומושקע יותר זמן על מציאת אנשים חדשים ופגישות איתם.
index.sign-up-now=הירשמו עכשיו!
index.js.confirm-registration=נשלחה הודעת דוא״ל לכתובת הדוא״ל שלך.
index.js.registration-confirm-success=האימות הצליח. כעת ניתן להתחבר ולפגוש אנשים חדשים באזורך!
index.js.registration-confirm-failed=האימות נכשל. נא לנסות שנית!
index.js.password-reset-requested=נשלחה הודעת דוא״ל לאיפוס הסיסמה. נא לבדוק את הדוא״ל ולעקוב אחר ההוראות.
index.js.password-change-success=הסיסמה שונתה בהצלחה!
index.js.confirm-account-deleted=המשתמש נמחק בהצלחה!
faq.title=שו״ת
faq.privacy.question=האם המידע שלי באמת מאובטח?
faq.privacy.answer=כן. אנחנו לא משתפים את המידע שלך עם אף צד שלישי.
faq.encryption.question=איך המידע שלי מוצפן?
faq.encryption.answer=אנחנו משתמשים בתקן ההצפנה AES.
faq.open-source.question=מה קוד פתוח אומר? למה המיזם הזה הוא בקוד פתוח?
faq.open-source.answer=קוד פתוח בגדול אומר שכל אחד יכול לראות איך כל חלק של התוכנה נוצר, כל אחד יכול להוסיף שינויים ולמצוא תקלים. אנחנו מאמינים שקוד פתוח הוא העתיד של כל הטכנולוגיה.
faq.safari.question=אני משתמש בדפדפן Safari ומשהו לא עובד!
faq.safari.answer=בגלל האופי המגביל של הדפדפן Safari אנחנו לא תומכים בו. אם אתם יש לכם macOS, אנחנו ממליצים להשתמש ב־Firefox. ב־Safari אין תמיכה בהודעות דחיפה באינטרנט באף פלטפורמה. נא לבקש את התכונה <a href="https://developer.apple.com/bug-reporting/">כאן</a>.
faq.match.question=אני לא מצליח לקבל התאמות. יש עצות?
faq.match.answer=להוסיף לפרופיל תמונה ברורה ושאינה ערוכה. להגיד בתיאור מה אתם אוהבים ומה אתם מחפשים.
faq.no-users.question=אין משתמשים באזור שלי!
faq.no-users.answer=אפשר לנסות בעוד כמה ימים – בסופו של דבר יהיו משתמשים באזור שלכם. בנוסף, אפשר לתרום או לספר למשפחה ולחברים כדי להפוך את הפלטפורמה לפופולרית אפילו יותר!
faq.delete-data.question=אני רוצה למחוק את המידע שלי. איך עושים את זה?
faq.delete-data.answer=אנחנו עצובים על שברצונך לעזוב, אבל אם זה רצונך – יש ללחוץ על הקישור „מחיקת החשבון” בתחתית עמוד המשתמש שלך. אחר כך יש לעקוב אחר ההוראות שיישלחו לדוא״ל.
