donate.title=תרומה
donate.notice-1=נא למלא את כתובת הדוא״ל באזור ההודעה או השם.
donate.notice-2=להשתמש ב־Stripe במקום ב־PayPal כי העמלות שלו נמוכות בהרבה.
donate.notice-3=כמות קטנה תרד כאן, בהתאם לעמלות מפעיל האתר.
